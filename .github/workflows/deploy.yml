name: Deploy Backend Django to EC2

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Sync Django code to EC2
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "."
          target: "/home/ubuntu/movie-web/backend"
          overwrite: true

      - name: Create .env and Deploy
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            ENV_FILE="/home/ubuntu/movie-web/backend/.env"
            echo "SECRET_KEY=${{ secrets.SECRET_KEY }}" > $ENV_FILE
            echo "DEBUG=${{ secrets.DEBUG }}" >> $ENV_FILE
            echo "ALLOWED_HOSTS=${{ secrets.ALLOWED_HOSTS }}" >> $ENV_FILE
            echo "DB_NAME=${{ secrets.DB_NAME }}" >> $ENV_FILE
            echo "DB_USER=${{ secrets.DB_USER }}" >> $ENV_FILE
            echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> $ENV_FILE
            echo "DB_HOST=${{ secrets.DB_HOST }}" >> $ENV_FILE
            echo "DB_PORT=${{ secrets.DB_PORT }}" >> $ENV_FILE

            cd /home/ubuntu/movie-web/backend
            docker compose -f docker-compose.prod.yml up -d --build
            docker compose -f docker-compose.prod.yml exec -T backend python manage.py migrate
